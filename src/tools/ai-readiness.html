<style>
/* AI Readiness Assessment Tool Styles */

/* === Tool-specific Variables === */
.ai-readiness {
  --level-pioneer: var(--success);
  --level-advanced: var(--info);
  --level-aware: var(--warning);
  --level-beginner: var(--warning-dark);
  --level-at-risk: var(--error);
  --timer-bar: var(--accent-primary);
  --timer-warning: var(--warning);
  --timer-danger: var(--error);
  --self-bg: rgba(139, 92, 246, 0.06);
  --self-border: rgba(139, 92, 246, 0.2);
  --self-accent: var(--accent-secondary);
  --matching-left: rgba(99, 102, 241, 0.08);
  --matching-right: rgba(34, 197, 94, 0.08);
  --matching-line: var(--accent-primary);
  max-width: 900px;
  margin: 0 auto;
  font-family: inherit;
}

.ai-readiness * {
  font-family: inherit;
}

/* === Animations === */
@keyframes airFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes airFadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-12px); }
}

@keyframes airPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

@keyframes airShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}

@keyframes airTimerShrink {
  from { width: 100%; }
  to { width: 0%; }
}

@keyframes airGaugeGrow {
  from { stroke-dashoffset: 314; }
}

@keyframes airRadarDraw {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes airBarGrow {
  from { width: 0; }
}

@keyframes airFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes airDragHint {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* === Screen Management === */
.air-screen {
  display: none;
}

.air-screen.active {
  display: block;
  animation: airFadeIn 0.4s ease;
}

/* === Welcome Screen === */
.air-welcome-header {
  text-align: center;
  margin-bottom: 32px;
}

.air-welcome-icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

.air-welcome-header h2 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.air-welcome-header p {
  font-size: 0.95rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.air-name-field {
  margin-bottom: 28px;
}

.air-name-field label {
  display: block;
  font-weight: 600;
  color: var(--text-primary);
  font-size: 0.9rem;
  margin-bottom: 8px;
}

.air-name-field input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border-color);
  border-radius: 10px;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 1rem;
  font-family: inherit;
  transition: border-color var(--transition-fast);
}

.air-name-field input:focus {
  outline: none;
  border-color: var(--accent-primary);
}

.air-duration-label {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 0.95rem;
  margin-bottom: 14px;
  display: block;
}

.air-duration-cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}

.air-duration-card {
  padding: 16px 10px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--bg-primary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.air-duration-card:hover {
  border-color: var(--accent-primary);
}

.air-duration-card.active {
  border-color: var(--accent-primary);
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent-primary);
}

.air-duration-card .dur-minutes {
  font-size: 1.6rem;
  font-weight: 700;
  display: block;
  line-height: 1.2;
}

.air-duration-card .dur-unit {
  font-size: 0.75rem;
  opacity: 0.8;
  display: block;
  margin-top: 2px;
}

.air-duration-card .dur-desc {
  font-size: 0.7rem;
  opacity: 0.65;
  display: block;
  margin-top: 6px;
}

.air-duration-card .dur-count {
  font-size: 0.7rem;
  opacity: 0.55;
  display: block;
  margin-top: 2px;
}

.air-duration-card.recommended {
  position: relative;
}

.air-duration-card.recommended::after {
  content: attr(data-badge);
  position: absolute;
  top: -9px;
  inset-inline-start: 50%;
  transform: translateX(-50%);
  background: var(--accent-primary);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
  white-space: nowrap;
}

[dir="rtl"] .air-duration-card.recommended::after {
  transform: translateX(50%);
}

.air-btn-start {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent-gradient);
  color: white;
  font-size: 1.05rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--btn-glow);
}

.air-btn-start:hover {
  box-shadow: var(--btn-glow-hover);
  transform: translateY(-1px);
}

.air-btn-start:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* === Quiz Screen === */

/* -- Top bar: progress + timers -- */
.air-quiz-topbar {
  margin-bottom: 24px;
}

.air-progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
}

.air-progress-bar {
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}

.air-progress-fill {
  height: 100%;
  background: var(--accent-gradient);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.air-timers {
  display: flex;
  gap: 12px;
  align-items: center;
}

.air-timer-global {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 6px 12px;
  background: var(--bg-secondary);
  border-radius: 8px;
}

.air-timer-global .timer-icon {
  font-size: 1rem;
}

.air-timer-global.warning {
  color: var(--timer-warning);
}

.air-timer-global.danger {
  color: var(--timer-danger);
}

.air-timer-question {
  flex: 1;
  height: 5px;
  background: var(--bg-tertiary);
  border-radius: 3px;
  overflow: hidden;
}

.air-timer-question-fill {
  height: 100%;
  background: var(--timer-bar);
  border-radius: 3px;
  transition: background-color 0.3s;
}

.air-timer-question-fill.warning {
  background: var(--timer-warning);
}

.air-timer-question-fill.danger {
  background: var(--timer-danger);
}

/* -- Question container -- */
.air-question-card {
  background: var(--bg-secondary);
  border-radius: 16px;
  padding: 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.air-question-card.time-up {
  animation: airFlash 0.5s ease 2;
}

.air-question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.air-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
}

.air-badge-type {
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent-primary);
}

.air-badge-axis {
  background: rgba(34, 197, 94, 0.1);
  color: var(--success);
}

.air-badge-points {
  background: rgba(245, 158, 11, 0.1);
  color: var(--warning-dark);
}

.air-question-text {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.7;
  margin-bottom: 20px;
}

/* -- MCQ Options -- */
.air-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.air-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--bg-primary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.95rem;
  color: var(--text-primary);
  line-height: 1.5;
}

.air-option:hover {
  border-color: var(--accent-primary);
  background: rgba(99, 102, 241, 0.04);
}

.air-option.selected {
  border-color: var(--accent-primary);
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent-primary);
}

.air-option.disabled {
  pointer-events: none;
  opacity: 0.6;
}

.air-option-marker {
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  transition: all var(--transition-fast);
}

.air-option.selected .air-option-marker {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  color: white;
}

/* -- True/False Buttons -- */
.air-tf-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.air-tf-btn {
  padding: 18px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--bg-primary);
  font-size: 1.05rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition-fast);
  color: var(--text-secondary);
  text-align: center;
}

.air-tf-btn:hover {
  border-color: var(--accent-primary);
}

.air-tf-btn.selected-true {
  border-color: var(--success);
  background: rgba(34, 197, 94, 0.1);
  color: var(--success);
}

.air-tf-btn.selected-false {
  border-color: var(--error);
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
}

.air-tf-btn.disabled {
  pointer-events: none;
  opacity: 0.6;
}

/* -- Fill in the Blank -- */
.air-fill-text {
  font-size: 1.05rem;
  line-height: 2;
  color: var(--text-primary);
}

.air-fill-select {
  display: inline-flex;
  padding: 6px 12px;
  border: 2px solid var(--accent-primary);
  border-radius: 8px;
  background: rgba(99, 102, 241, 0.06);
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  cursor: pointer;
  appearance: auto;
  min-width: 140px;
  vertical-align: middle;
}

.air-fill-select:focus {
  outline: none;
  border-color: var(--accent-secondary);
}

.air-fill-select.disabled {
  pointer-events: none;
  opacity: 0.6;
}

/* -- Matching (Connect) -- */
.air-matching-area {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: start;
}

.air-matching-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.air-matching-item {
  padding: 12px 14px;
  border: 2px solid var(--border-color);
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
  user-select: none;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.4;
}

.air-matching-left .air-matching-item {
  background: var(--matching-left);
}

.air-matching-right .air-matching-item {
  background: var(--matching-right);
}

.air-matching-item.active {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
}

.air-matching-item.matched {
  border-color: var(--success);
  opacity: 0.7;
  cursor: default;
}

.air-matching-item.disabled {
  pointer-events: none;
  opacity: 0.5;
}

.air-matching-lines {
  position: relative;
  min-width: 40px;
  align-self: stretch;
}

.air-matching-lines svg {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  inset-inline-start: 0;
}

.air-matching-lines svg line {
  stroke: var(--matching-line);
  stroke-width: 2;
  stroke-linecap: round;
}

/* -- Sorting (Drag & Drop) -- */
.air-sorting-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.air-sorting-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--bg-primary);
  cursor: grab;
  transition: all var(--transition-fast);
  font-size: 0.95rem;
  color: var(--text-primary);
  user-select: none;
  line-height: 1.4;
}

.air-sorting-item:active {
  cursor: grabbing;
}

.air-sorting-item.dragging {
  opacity: 0.5;
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-lg);
}

.air-sorting-item.drag-over {
  border-color: var(--accent-primary);
  background: rgba(99, 102, 241, 0.06);
}

.air-sorting-item.disabled {
  pointer-events: none;
  opacity: 0.6;
  cursor: default;
}

.air-sorting-handle {
  color: var(--text-muted);
  font-size: 1.1rem;
  min-width: 20px;
  text-align: center;
  animation: airDragHint 1.5s ease infinite;
}

.air-sorting-item.dragging .air-sorting-handle,
.air-sorting-item.disabled .air-sorting-handle {
  animation: none;
}

.air-sorting-number {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
}

/* -- Self Assessment (Softer Design) -- */
.air-question-card.self-assessment {
  background: var(--self-bg);
  border: 1px solid var(--self-border);
}

.air-question-card.self-assessment .air-question-text {
  color: var(--text-primary);
}

.air-self-label {
  font-size: 0.75rem;
  color: var(--self-accent);
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.air-self-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.air-self-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 1.5px solid var(--self-border);
  border-radius: 12px;
  background: var(--bg-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.95rem;
  color: var(--text-primary);
  line-height: 1.5;
}

.air-self-option:hover {
  border-color: var(--self-accent);
  background: rgba(139, 92, 246, 0.06);
}

.air-self-option.selected {
  border-color: var(--self-accent);
  background: rgba(139, 92, 246, 0.12);
  color: var(--accent-secondary);
}

.air-self-option .air-option-marker {
  border-color: var(--self-border);
}

.air-self-option.selected .air-option-marker {
  background: var(--self-accent);
  border-color: var(--self-accent);
  color: white;
}

/* -- Time Up Overlay -- */
.air-timeup-overlay {
  display: none;
  position: absolute;
  top: 0;
  inset-inline-start: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.6);
  border-radius: 16px;
  z-index: 5;
  align-items: center;
  justify-content: center;
}

.air-timeup-overlay.show {
  display: flex;
}

.air-timeup-msg {
  background: var(--bg-secondary);
  padding: 16px 28px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1rem;
  color: var(--error);
  box-shadow: var(--shadow-lg);
}

/* -- Next Button -- */
.air-quiz-footer {
  display: flex;
  justify-content: flex-end;
}

.air-btn-next {
  padding: 12px 32px;
  border: none;
  border-radius: 10px;
  background: var(--accent-gradient);
  color: white;
  font-size: 0.95rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--btn-glow);
}

.air-btn-next:hover {
  box-shadow: var(--btn-glow-hover);
  transform: translateY(-1px);
}

.air-btn-next:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* === Specialty Selection Screen === */
.air-specialty-header {
  text-align: center;
  margin-bottom: 28px;
}

.air-specialty-header h2 {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.air-specialty-header p {
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.air-specialty-group {
  margin-bottom: 20px;
}

.air-specialty-group-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-color);
}

.air-specialty-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.air-specialty-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 2px solid var(--border-color);
  border-radius: 10px;
  background: var(--bg-primary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.88rem;
  color: var(--text-secondary);
  user-select: none;
}

.air-specialty-card:hover {
  border-color: var(--accent-primary);
}

.air-specialty-card.selected {
  border-color: var(--accent-primary);
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent-primary);
}

.air-specialty-check {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border-radius: 6px;
  border: 2px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  font-size: 0.7rem;
  color: transparent;
}

.air-specialty-card.selected .air-specialty-check {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  color: white;
}

.air-btn-continue {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent-gradient);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--btn-glow);
  margin-top: 24px;
}

.air-btn-continue:hover {
  box-shadow: var(--btn-glow-hover);
  transform: translateY(-1px);
}

.air-btn-continue:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* === Report Screen === */

/* -- Gauge (Circular Score) -- */
.air-report-header {
  text-align: center;
  margin-bottom: 32px;
}

.air-gauge-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto 16px;
}

.air-gauge-svg {
  width: 200px;
  height: 200px;
  transform: rotate(-90deg);
}

.air-gauge-bg {
  fill: none;
  stroke: var(--bg-tertiary);
  stroke-width: 10;
}

.air-gauge-fill {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.5s ease, stroke 0.5s ease;
}

.air-gauge-score {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.air-gauge-number {
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
}

.air-gauge-max {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.air-level-badge {
  display: inline-block;
  padding: 6px 20px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.95rem;
  color: white;
  margin-bottom: 12px;
}

.air-level-badge.pioneer { background: var(--level-pioneer); }
.air-level-badge.advanced { background: var(--level-advanced); }
.air-level-badge.aware { background: var(--level-aware); }
.air-level-badge.beginner { background: var(--level-beginner); }
.air-level-badge.at-risk { background: var(--level-at-risk); }

.air-summary-text {
  font-size: 0.95rem;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}

/* -- Report Sections -- */
.air-report-section {
  background: var(--bg-secondary);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}

.air-report-section h3 {
  font-size: 1.05rem;
  font-weight: 700;
